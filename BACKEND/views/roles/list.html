{% extends "layout.html" %}

{% block content %}
<h2 class="mb-4">Gestió de Rols</h2>

<a href="/roles/create" class="btn btn-primary mb-3">+ Crear nou rol</a>

<div class="row">
  {% for rol in roles %}
  <div class="col-12 col-md-6 col-lg-4 mb-3">
    <div class="card h-100 shadow-sm p-3">
      <div class="card-body d-flex flex-column">
        <h5 class="card-title mb-2 text-truncate" title="{{ rol.nom }}">
          🎖️ {{ rol.nom }}
        </h5>

        <p class="small text-muted mb-2"><strong>ID:</strong> {{ rol.id }}</p>

        <div class="mb-2">
          <strong>🔑 Permisos:</strong>
          <p>{{ rol.permisos }}</p>
        </div>

        <div class="mt-auto d-flex justify-content-end gap-1">
          <a href="/roles/edit/{{ rol.id }}" class="btn btn-sm btn-outline-warning" title="Editar">✏️</a>
          <form action="/roles/delete/{{ rol.id }}?_method=DELETE" method="POST"
            onsubmit="return confirm('Estàs segur que vols eliminar aquest rol?')">
            <button type="submit" class="btn btn-sm btn-outline-danger" title="Eliminar">🗑️</button>
          </form>
        </div>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
